name: Kisanvani Daily Recorder (6:00-6:30 PM IST)

on:
  schedule:
    - cron: '00 12 * * *'      # 5:30 PM IST (early backup trigger)
      timezone: 'Asia/Kolkata'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'External backup trigger'

concurrency:
  group: kisanvani-daily-recorder
  cancel-in-progress: false

jobs:
  daily-recorder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.8

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install beautifulsoup4 requests internetarchive pytz fpdf

      # ==================== INITIAL STATUS ====================

      - name: Wake-up Log
        id: wakeup
        run: |
          echo "🚀 Kisanvani Daily Recorder Started"
          echo "Trigger     : ${{ github.event_name }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Reason      : ${{ inputs.reason }}"
          fi

      - name: Check Current IST Time
        id: timecheck
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();
            const istOffset = 5.5 * 60 * 60 * 1000;
            const istTime = new Date(now.getTime() + istOffset);
            
            const hours = istTime.getUTCHours();
            const minutes = istTime.getUTCMinutes();
            const currentTimeStr = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}`;
            
            const isInWindow = (hours === 18 && minutes >= 0 && minutes <= 30);
            
            core.setOutput('in_window', isInWindow);
            core.setOutput('ist_time', currentTimeStr);
            core.setOutput('ist_time_full', istTime.toISOString());

      # ==================== TELEGRAM NOTIFICATIONS (Beautiful Format) ====================

      - name: Send Wake-up Notification
        run: |
          python telegram.py "🚀 <b>Kisanvani Daily Recorder</b>🕒 <b>Time:</b> ${{ steps.timecheck.outputs.ist_time }} IST 📡 <b>Trigger:</b> ${{ github.event_name }} ${{ github.event_name == 'workflow_dispatch' && format('📝 Reason: {0}', inputs.reason) || '' }}"
        env:
          CNC_CH_ID: ${{ secrets.CNC_CH_ID }}
          CHATHUR_BOT: ${{ secrets.CHATHUR_BOT }}
        continue-on-error: true

      - name: Time Window Check
        run: |
          if [[ "${{ steps.timecheck.outputs.in_window }}" == "true" ]]; then
            echo "✅ Inside Allowed Time Window (18:00 - 18:30 IST)"
          else
            echo "❌ Outside Allowed Time Window"
          fi

      - name: Check Previous Successful Run
        id: already_ran
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'kisanvani_daily_recorder.yaml',
              status: 'completed',
              per_page: 5
            });

            const alreadyRanToday = runs.data.workflow_runs.some(run => {
              const runDate = new Date(run.created_at).toISOString().split('T')[0];
              return runDate === today && run.conclusion === 'success';
            });

            core.setOutput('already_ran', alreadyRanToday);

      - name: Already Ran Check
        run: |
          if [[ "${{ steps.already_ran.outputs.already_ran }}" == "true" ]]; then
            echo "✅ Already completed successfully today"
          else
            echo "ℹ️  First run of the day"
          fi

      # ==================== SKIP CASES ====================

      - name: Skip - Outside Time Window
        if: steps.timecheck.outputs.in_window != 'true'
        run: |
          python telegram.py "❌ <b>Kisanvani Recorder Skipped</b> 🕒 <b>Time:</b> ${{ steps.timecheck.outputs.ist_time }} IST 📛 <b>Reason:</b> Outside allowed time window ✅ Allowed Window: 6:00 PM - 6:30 PM IST
          "
        env:
          CNC_CH_ID: ${{ secrets.CNC_CH_ID }}
          CHATHUR_BOT: ${{ secrets.CHATHUR_BOT }}
        continue-on-error: true

      - name: Skip - Already Ran Today
        if: steps.already_ran.outputs.already_ran == 'true'
        run: |
          python telegram.py "
              ⏭️ <b>Kisanvani Recorder Skipped</b>
              🕒 <b>Time:</b> ${{ steps.timecheck.outputs.ist_time }} IST
              📛 <b>Reason:</b> Already ran successfully today
          "
        env:
          CNC_CH_ID: ${{ secrets.CNC_CH_ID }}
          CHATHUR_BOT: ${{ secrets.CHATHUR_BOT }}
        continue-on-error: true

      # ==================== MAIN EXECUTION ====================

      - name: Run Main Recording Script
        if: steps.timecheck.outputs.in_window == 'true' && steps.already_ran.outputs.already_ran != 'true'
        run: python ka_radio_github.py city10
        env:
          KISANVANI_CH_ID: ${{ secrets.KISANVANI_CH_ID }}
          CNC_CH_ID: ${{ secrets.CNC_CH_ID }}
          FORMER_RADIO_BOT: ${{ secrets.FORMER_RADIO_BOT }}
          CHATHUR_BOT: ${{ secrets.CHATHUR_BOT }}
          access_key: ${{ secrets.access_key }}
          secret_key: ${{ secrets.secret_key }}
        timeout-minutes: 80

      - name: Send Success Notification
        if: success() && steps.timecheck.outputs.in_window == 'true' && steps.already_ran.outputs.already_ran != 'true'
        run: |
          python telegram.py "
          ✅ <b>Kisanvani Daily Recording Completed Successfully</b>
          🕒 <b>Completed at:</b> ${{ steps.timecheck.outputs.ist_time }} IST
          📡 <b>Trigger:</b> ${{ github.event_name }}
          🎯 <b>Status:</b> Success
          "
        env:
          CNC_CH_ID: ${{ secrets.CNC_CH_ID }}
          CHATHUR_BOT: ${{ secrets.CHATHUR_BOT }}
        continue-on-error: true
